name: Foundationwatch
options:
  bundleIdPrefix: com.shimondeitel.foundationwatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Foundationwatch:
    type: application
    platform: iOS
    sources:
      - path: Foundationwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.foundationwatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Foundationwatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FoundationwatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FoundationwatchTests
      - path: Foundationwatch.storekit
    dependencies:
      - target: Foundationwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.foundationwatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FoundationwatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FoundationwatchUITests
    dependencies:
      - target: Foundationwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.foundationwatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Foundationwatch:
    build:
      targets:
        Foundationwatch: all
        FoundationwatchTests: [test]
        FoundationwatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Foundationwatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Foundationwatch.storekit
      targets:
        - FoundationwatchTests
        - FoundationwatchUITests
    archive:
      config: Release
